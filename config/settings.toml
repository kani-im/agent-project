[strategy]
target_markets = ["KRW-BTC", "KRW-ETH"]
min_combined_confidence = 0.65

[strategy.weights]
ta = 0.4
ml = 0.35
sentiment = 0.25

[risk]
max_position_ratio = 0.3
max_daily_loss_krw = 100000
max_single_order_krw = 50000
max_open_positions = 999  # No practical limit on concurrently held coins
drawdown_limit = 0.05

[rules]
entry_rise_pct = 0.03      # Buy when coin rises +3% in lookback window
lookback_seconds = 300     # 5-minute lookback window
take_profit_pct = 0.05     # Sell full position at +5% profit
stop_loss_pct = 0.02       # Sell full position at -2% loss
max_entry_krw = 50000      # Max 50,000 KRW per buy order per coin

[candle]
intervals = ["1m", "5m", "15m", "1h"]
